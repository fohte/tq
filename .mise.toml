[tools]
lefthook = "2.1.9"

# lefthook hooks
actionlint = "1.7.12"
"github:betterleaks/betterleaks" = "1.6.1"
node = "24.18.0"
pinact = "4.1.0"
"github:fohte/basefmt" = "0.1.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"

[env]
# .env.runtime is generated by `mise run db:up` (actual db port; git-ignored).
# .env.local is personal, git-ignored, and always wins over .env.runtime.
_.file = ['.env.runtime', '.env.local']

[tasks."db:up"]
description = "Start the local Postgres container and write .env.runtime with its port"
file = "scripts/db-up"
