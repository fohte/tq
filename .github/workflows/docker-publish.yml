name: Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - component: api
            dockerfile: ./api/Dockerfile
          - component: web
            dockerfile: ./web/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          build-args: ${{ matrix.component == 'web' && format('VITE_API_URL={0}', secrets.VITE_API_URL) || '' }}
          # Disable provenance to avoid ghcr.io permission_denied errors on private packages
          # ref: https://github.com/docker/build-push-action/issues/981
          provenance: false

  notify-keel:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CI_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CI_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Notify Keel
        run: |
          curl --fail -X POST \
            -H 'Content-Type: application/json' \
            -d '{"name": "ghcr.io/fohte/tq/api", "tag": "latest"}' \
            "$KEEL_WEBHOOK_URL"
          curl --fail -X POST \
            -H 'Content-Type: application/json' \
            -d '{"name": "ghcr.io/fohte/tq/web", "tag": "latest"}' \
            "$KEEL_WEBHOOK_URL"
        env:
          KEEL_WEBHOOK_URL: ${{ secrets.KEEL_WEBHOOK_URL }}
