name: Test

on:
  push:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check if previous commit is auto-format by bot
        id: check-prev
        run: |
          prev_commit_message=$(git log -1 --skip=1 --format=%s)
          prev_commit_author=$(git log -1 --skip=1 --format=%an)
          echo "Previous commit message: $prev_commit_message"
          echo "Previous commit author: $prev_commit_author"

          # Skip auto-format commit if previous commit is auto-format by a bot
          if [ "$prev_commit_message" = "style: auto-format" ] && [[ "$prev_commit_author" == *"[bot]"* ]]; then
            echo "skip_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: jdx/mise-action@v3

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            node_modules
            web/node_modules
            api/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Run lefthook
        id: lefthook
        continue-on-error: true
        run: lefthook run pre-commit --all-files

      # lefthook-config's formatters run `git add` after formatting, which stages the changes.
      # https://github.com/fohte/lefthook-config/blob/v0.1.7/base.yml
      # commit-action uses `git ls-files --modified` which only detects unstaged changes.
      # https://github.com/suzuki-shunsuke/commit-action/blob/87b297f0ce551411b43d1880f4fb3cbc60381055/action.yaml#L57
      # We need to unstage the changes so commit-action can detect them.
      - name: Unstage changes for commit-action
        run: git restore --staged .

      - name: Commit formatted files
        if: ${{ !cancelled() && steps.check-prev.outputs.skip_commit != 'true' }}
        uses: suzuki-shunsuke/commit-action@v0.1.1
        with:
          commit_message: 'style: auto-format'
          workflow: deny
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Fail if lefthook failed
        if: steps.lefthook.outcome == 'failure'
        run: exit 1

  detect-changes:
    runs-on: ubuntu-slim
    outputs:
      web: ${{ steps.changes-web.outputs.any_changed }}
      api: ${{ steps.changes-api.outputs.any_changed }}
      workflow: ${{ steps.changes-workflow.outputs.any_changed }}
      root-lockfile: ${{ steps.changes-root-lockfile.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for web changes
        uses: tj-actions/changed-files@v47
        id: changes-web
        with:
          files: web/**

      - name: Check for api changes
        uses: tj-actions/changed-files@v47
        id: changes-api
        with:
          files: api/**

      - name: Check for workflow changes
        uses: tj-actions/changed-files@v47
        id: changes-workflow
        with:
          files: .github/workflows/test.yml

      - name: Check for root lockfile changes
        uses: tj-actions/changed-files@v47
        id: changes-root-lockfile
        with:
          files: |
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml

  unit-test-web:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.web == 'true' ||
      needs.detect-changes.outputs.workflow == 'true' ||
      needs.detect-changes.outputs.root-lockfile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            node_modules
            web/node_modules
            api/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: web
        run: pnpm run test

  unit-test-api:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.workflow == 'true' ||
      needs.detect-changes.outputs.root-lockfile == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tq
          POSTGRES_PASSWORD: tq
          POSTGRES_DB: tq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            node_modules
            web/node_modules
            api/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: api
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://tq:tq@localhost:5432/tq_test
