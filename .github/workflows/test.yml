name: Test

on:
  push:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}
          domain: octo-sts.fohte.net

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check if current commit is auto-format by bot
        id: check-auto-format
        run: |
          commit_message=$(git log -1 --format=%s)
          commit_author=$(git log -1 --format=%an)
          echo "Current commit message: $commit_message"
          echo "Current commit author: $commit_author"

          # Skip if the current commit is an auto-format commit by a bot
          # to prevent infinite loop: auto-format push -> CI -> auto-format push -> ...
          if [ "$commit_message" = "style: auto-format" ] && [[ "$commit_author" == *"[bot]"* ]]; then
            echo "skip_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.11

      # lefthook hooks (eslint, prettier, etc.) shell out to `pnpm`, so corepack
      # must activate and dependencies must be installed before lefthook runs.
      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Run lefthook
        id: lefthook
        continue-on-error: true
        env:
          # pinact's min-age check calls the GitHub API; without a token it hits
          # the 60 req/h unauthenticated limit shared per IP and fails on CI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: lefthook run pre-commit --all-files

      # Formatters configured with `stage_fixed: true` run `git add` after formatting,
      # which stages the changes.
      # commit-action uses `git ls-files --modified` which only detects unstaged changes.
      # https://github.com/suzuki-shunsuke/commit-action/blob/87b297f0ce551411b43d1880f4fb3cbc60381055/action.yaml#L57
      # We need to unstage the changes so commit-action can detect them.
      - name: Unstage changes for commit-action
        run: git restore --staged .

      - name: Commit formatted files
        if: ${{ !cancelled() && steps.check-auto-format.outputs.skip_commit != 'true' }}
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: 'style: auto-format'
          workflow: deny
          github_token: ${{ steps.octo-sts.outputs.token }}

      - name: Fail if lefthook failed
        if: steps.lefthook.outcome == 'failure'
        run: exit 1

  # Build the unit-test matrix at runtime: branch protection pins the fixed-name
  # `unit-test` gate below, so the per-package legs are enumerated here instead.
  setup:
    runs-on: ubuntu-slim
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changed
        with:
          json: true
          # Emit valid JSON; the default escapes quotes and breaks jq parsing.
          escape_json: false

      - name: Build package matrix
        id: set-packages
        env:
          # Changes to these files affect every package, so they trigger the full matrix.
          GLOBAL_PATHS_REGEX: '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.github/workflows/test\.yml)$'
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          # Workspace packages are the directories holding a non-root package.json.
          mapfile -t pkgs < <(git ls-files '*/package.json' | grep -v node_modules | sed 's#/package.json$##' | sort -u)

          if echo "$CHANGED_FILES" | jq -r '.[]' | grep -qE "$GLOBAL_PATHS_REGEX"; then
            selected=("${pkgs[@]}")
          else
            selected=()
            for dir in "${pkgs[@]}"; do
              if echo "$CHANGED_FILES" | jq -e --arg d "${dir}/" 'any(.[]; startswith($d))' >/dev/null; then
                selected+=("$dir")
              fi
            done
          fi

          if [ ${#selected[@]} -eq 0 ]; then
            packages='[]'
          else
            packages=$(printf '%s\n' "${selected[@]}" | jq -R . | jq -sc .)
          fi
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Selected packages: $packages"

  unit-test-run:
    needs: setup
    if: ${{ needs.setup.outputs.packages != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.packages) }}
    name: 'unit-test (${{ matrix.package }})'
    runs-on: ubuntu-latest
    # The `api` and `e2e` legs need PostgreSQL (e2e's webServer starts api's dev
    # server against it). The matrix legs share one job definition, so this
    # service starts for every package — harmless idle cost for the `web` leg,
    # but avoids forking the job.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tq
          POSTGRES_PASSWORD: tq
          POSTGRES_DB: tq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.11

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      # Install the full workspace: `web`'s `tsc --noEmit` reads `api`'s source for
      # cross-package types, so a `--filter ./web...` install leaves it unable to
      # resolve `api`'s `node_modules` and the type-check step fails.
      - run: pnpm install --frozen-lockfile

      # `web`'s `test:storybook` and `e2e`'s Playwright suite both run through
      # a headless Chromium browser, which isn't preinstalled on the runner.
      - name: Install Playwright chromium
        if: matrix.package == 'web' || matrix.package == 'e2e'
        working-directory: ${{ matrix.package }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: pnpm run test

  # Aggregation gate for the unit-test matrix. Matrix leg names are dynamic and
  # cannot be pinned as a required status check, so this single fixed-name job is
  # the branch protection gate instead. It fails only when a needed job failed;
  # when every leg succeeds (or the matrix is skipped because nothing changed) it
  # is skipped, and a skipped required check counts as success.
  unit-test:
    runs-on: ubuntu-slim
    needs:
      - setup
      - unit-test-run
    if: failure()
    steps:
      - run: exit 1
