packages:
  - 'web'
  - 'api'

allowBuilds:
  # required by vitest's transformer
  esbuild: true
  # msw is only used as a transitive dependency; the postinstall sets up a browser
  # service worker that we don't need
  msw: false
  # required by @opentelemetry/exporter-trace-otlp-proto
  protobufjs: true
  # required by @fohte/eslint-config -> eslint-plugin-import-x for "@/*" resolution
  unrs-resolver: true

# Dodge short-lived supply-chain attacks (e.g. shai-hulud, tinycolor) by
# holding off freshly published versions. Unit is minutes; 10080 = 7 days.
minimumReleaseAge: 10080
# First-party scopes: publisher account is trusted, so skip the release-age delay.
minimumReleaseAgeExclude:
  - '@fohte/*'
  # Renovate security update: vite@7.3.5
  - vite@7.3.5
  # Renovate security update: hono@4.12.25 || 4.12.27
  - hono@4.12.25 || 4.12.27
