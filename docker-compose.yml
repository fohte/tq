services:
  app:
    build: .
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://tq:tq@postgres:5432/tq_dev
      PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: tq
      POSTGRES_PASSWORD: tq
      POSTGRES_DB: tq_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tq -d tq_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
