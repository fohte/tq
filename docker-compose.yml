services:
  app:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tq}:${POSTGRES_PASSWORD:-tq}@db:5432/${POSTGRES_DB:-tq_dev}
      CORS_ORIGIN: http://localhost:${WEB_PORT:-5173}
      PORT: '3001'
    ports:
      - '127.0.0.1:${APP_PORT:-3001}:3001'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/api/node_modules
    networks:
      - tq-net

  web:
    image: node:24-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter web dev --host"
    environment:
      VITE_API_URL: http://localhost:${APP_PORT:-3001}
    ports:
      - '127.0.0.1:${WEB_PORT:-5173}:5173'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - api_node_modules:/app/api/node_modules
      - web_pkg_node_modules:/app/web/node_modules
    depends_on:
      - app
    networks:
      - tq-net

volumes:
  web_node_modules:
  api_node_modules:
  web_pkg_node_modules:

networks:
  tq-net:
    external: true
